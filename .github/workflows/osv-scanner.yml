name: OSV Scanner

on:
  push:
    branches: [master]
  schedule:
    - cron: "30 12 * * 1" # every Monday at 12:30 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
