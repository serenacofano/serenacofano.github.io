name: SBOM

on:
  push:
    branches: [master]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: npx --yes @cyclonedx/cdxgen@12.5.1 -r . -o bom.json --spec-version 1.6
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: bom.json
          retention-days: 90
