name: SBOM

on:
  push:
    branches: [master]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npx --yes @cyclonedx/cdxgen@12.5.1 -r . -o bom.json --spec-version 1.6
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: bom.json
          retention-days: 90
