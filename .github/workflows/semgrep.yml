name: Semgrep

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: pip install semgrep==1.165.0
      - run: semgrep --config=p/javascript --config=p/typescript --error .
