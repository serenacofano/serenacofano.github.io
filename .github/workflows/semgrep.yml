name: Semgrep

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: pip install semgrep==1.165.0
      - run: semgrep --config=p/javascript --config=p/typescript --error .
